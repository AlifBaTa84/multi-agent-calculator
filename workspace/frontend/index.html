
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .calculator-frame {
            background-color: #343a40; /* Dark background for calculator */
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 100%;
            max-width: 360px; /* Max width for calculator */
            overflow: hidden;
        }
        .display {
            background-color: #212529; /* Even darker display background */
            color: #ffffff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: right;
            overflow: hidden;
        }
        #display-input {
            font-size: 1.2em;
            color: #adb5bd; /* Lighter grey for input/expression */
            min-height: 25px;
            white-space: nowrap;
            overflow-x: auto;
        }
        #display-result {
            font-size: 2.8em;
            font-weight: bold;
            min-height: 50px;
            white-space: nowrap;
            overflow-x: auto;
        }
        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .btn {
            border-radius: 8px;
            font-size: 1.5em;
            padding: 15px 0;
            transition: background-color 0.2s, transform 0.1s;
            border: none;
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-operator, .btn-clear {
            background-color: #ffc107; /* Orange for operators */
            color: #343a40;
        }
        .btn-operator:hover, .btn-clear:hover {
            background-color: #e0a800;
        }
        .btn-number {
            background-color: #6c757d; /* Grey for numbers */
        }
        .btn-number:hover {
            background-color: #5a6268;
        }
        .btn-equals {
            background-color: #28a745; /* Green for equals */
            grid-column: span 2;
        }
        .btn-equals:hover {
            background-color: #218838;
        }
        .btn-other {
            background-color: #007bff; /* Blue for decimal/plus-minus */
        }
        .btn-other:hover {
            background-color: #0069d9;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .calculator-frame {
                width: 95%;
                padding: 15px;
            }
            .btn {
                font-size: 1.3em;
                padding: 12px 0;
            }
            #display-result {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-frame">
        <div class="display">
            <div id="display-input"></div>
            <div id="display-result">0</div>
        </div>
        <div class="calculator-buttons">
            <button class="btn btn-clear" data-action="clear">C</button>
            <button class="btn btn-clear" data-action="clear-entry">CE</button>
            <button class="btn btn-other" data-action="plus-minus">+/-</button>
            <button class="btn btn-operator" data-action="divide">/</button>

            <button class="btn btn-number" data-action="number">7</button>
            <button class="btn btn-number" data-action="number">8</button>
            <button class="btn btn-number" data-action="number">9</button>
            <button class="btn btn-operator" data-action="multiply">*</button>

            <button class="btn btn-number" data-action="number">4</button>
            <button class="btn btn-number" data-action="number">5</button>
            <button class="btn btn-number" data-action="number">6</button>
            <button class="btn btn-operator" data-action="subtract">-</button>

            <button class="btn btn-number" data-action="number">1</button>
            <button class="btn btn-number" data-action="number">2</button>
            <button class="btn btn-number" data-action="number">3</button>
            <button class="btn btn-operator" data-action="add">+</button>

            <button class="btn btn-number" data-action="number">0</button>
            <button class="btn btn-other" data-action="decimal">.</button>
            <button class="btn btn-equals" data-action="equals">=</button>
        </div>
    </div>

    <!-- Bootstrap JS CDN (optional, not strictly needed for this basic calculator but good practice) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        let currentInput = '0';
        let previousValue = null;
        let currentOperator = null;
        let waitingForNewNumber = true;
        let displayExpression = '';

        const displayInput = document.getElementById('display-input');
        const displayResult = document.getElementById('display-result');
        const buttons = document.querySelector('.calculator-buttons');

        function updateDisplay() {
            displayInput.innerText = displayExpression;
            displayResult.innerText = currentInput;
        }

        function calculate(num1, operator, num2) {
            num1 = parseFloat(num1);
            num2 = parseFloat(num2);

            if (isNaN(num1) || isNaN(num2)) {
                return 'Error';
            }

            switch (operator) {
                case '+': return (num1 + num2).toString();
                case '-': return (num1 - num2).toString();
                case '*': return (num1 * num2).toString();
                case '/':
                    if (num2 === 0) return 'Error: Div by zero';
                    return (num1 / num2).toString();
                default: return num2.toString();
            }
        }

        buttons.addEventListener('click', (event) => {
            if (!event.target.matches('.btn')) return;

            const button = event.target;
            const action = button.dataset.action;
            const buttonValue = button.innerText;

            if (action === 'number') {
                if (waitingForNewNumber) {
                    currentInput = buttonValue;
                    waitingForNewNumber = false;
                } else {
                    currentInput = currentInput === '0' ? buttonValue : currentInput + buttonValue;
                }
            } else if (action === 'decimal') {
                if (waitingForNewNumber) {
                    currentInput = '0.';
                    waitingForNewNumber = false;
                } else if (!currentInput.includes('.')) {
                    currentInput += '.';
                }
            } else if (action === 'add' || action === 'subtract' || action === 'multiply' || action === 'divide') {
                if (previousValue !== null && currentOperator !== null && !waitingForNewNumber) {
                    currentInput = calculate(previousValue, currentOperator, currentInput);
                    if (currentInput.includes('Error')) {
                        displayExpression = '';
                        currentInput = 'Error';
                        previousValue = null;
                        currentOperator = null;
                        waitingForNewNumber = true;
                        updateDisplay();
                        return;
                    }
                    previousValue = currentInput;
                } else if (previousValue === null) {
                    previousValue = currentInput;
                }
                currentOperator = buttonValue;
                displayExpression = previousValue + ' ' + currentOperator;
                waitingForNewNumber = true;
            } else if (action === 'equals') {
                if (previousValue !== null && currentOperator !== null) {
                    currentInput = calculate(previousValue, currentOperator, currentInput);
                    if (currentInput.includes('Error')) {
                        displayExpression = '';
                        currentInput = 'Error';
                        previousValue = null;
                        currentOperator = null;
                        waitingForNewNumber = true;
                        updateDisplay();
                        return;
                    }
                    displayExpression = previousValue + ' ' + currentOperator + ' ' + (waitingForNewNumber ? previousValue : currentInput) + ' ='; // Adjust for repeated equals
                    previousValue = null;
                    currentOperator = null;
                    waitingForNewNumber = true;
                } else if (currentInput.includes('Error')) {
                    // Do nothing if already in error state
                }
            } else if (action === 'clear') {
                currentInput = '0';
                previousValue = null;
                currentOperator = null;
                waitingForNewNumber = true;
                displayExpression = '';
            } else if (action === 'clear-entry') {
                currentInput = '0';
                waitingForNewNumber = true;
            } else if (action === 'plus-minus') {
                if (currentInput !== '0' && !currentInput.includes('Error')) {
                    currentInput = (parseFloat(currentInput) * -1).toString();
                }
            }
            updateDisplay();
        });

        // Initialize display
        updateDisplay();

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;

            if (key >= '0' && key <= '9') {
                document.querySelector(`.btn[data-action="number"][data-value="${key}"]`)?.click();
                document.querySelector(`.btn[data-action="number"]:not([data-value])`) // Fallback for numbers
                    .forEach(btn => {
                        if (btn.innerText === key) btn.click();
                    });
            } else if (key === '.') {
                document.querySelector('.btn[data-action="decimal"]').click();
            } else if (key === '+') {
                document.querySelector('.btn[data-action="add"]').click();
            } else if (key === '-') {
                document.querySelector('.btn[data-action="subtract"]').click();
            } else if (key === '*') {
                document.querySelector('.btn[data-action="multiply"]').click();
            } else if (key === '/') {
                document.querySelector('.btn[data-action="divide"]').click();
            } else if (key === 'Enter' || key === '=') {
                document.querySelector('.btn[data-action="equals"]').click();
                event.preventDefault(); // Prevent default Enter key behavior (e.g., submitting forms)
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                document.querySelector('.btn[data-action="clear"]').click();
            } else if (key === 'Backspace') {
                if (!waitingForNewNumber && currentInput.length > 1) {
                    currentInput = currentInput.slice(0, -1);
                } else {
                    currentInput = '0';
                    waitingForNewNumber = true;
                }
                updateDisplay();
            }
        });
    </script>
</body>
</html>
