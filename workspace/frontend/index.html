<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5; /* Light mode default */
            transition: background-color 0.3s ease;
        }

        .dark-mode {
            background-color: #2c3e50; /* Dark mode background */
            color: #ecf0f1;
        }

        .calculator-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px; /* Adjust for responsiveness */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dark-mode .calculator-container {
            background-color: #34495e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .display {
            background-color: #ecf0f1;
            border-radius: 10px;
            padding: 15px 20px;
            text-align: right;
            margin-bottom: 10px;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .dark-mode .display {
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .display-expression {
            font-size: 1.2em;
            color: #7f8c8d;
            height: 30px; /* Fixed height for expression */
            overflow: hidden;
        }
        .dark-mode .display-expression {
            color: #bdc3c7;
        }

        .display-result {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
            height: 40px; /* Fixed height for result */
            overflow: hidden;
        }
        .dark-mode .display-result {
            color: #ecf0f1;
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            font-size: 1.5em;
            padding: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Number buttons */
        .btn-number {
            background-color: #e0e0e0;
            color: #34495e;
        }
        .dark-mode .btn-number {
            background-color: #4a6572;
            color: #ecf0f1;
        }
        .btn-number:hover {
            background-color: #d5d5d5;
        }
        .dark-mode .btn-number:hover {
            background-color: #55717e;
        }

        /* Operator buttons */
        .btn-operator {
            background-color: #f39c12;
            color: white;
        }
        .btn-operator:hover {
            background-color: #e67e22;
        }

        /* Special function buttons (C, AC, %, +/-, etc.) */
        .btn-special {
            background-color: #bdc3c7;
            color: #34495e;
        }
        .dark-mode .btn-special {
            background-color: #7f8c8d;
            color: #ecf0f1;
        }
        .btn-special:hover {
            background-color: #aeb6bf;
        }
        .dark-mode .btn-special:hover {
            background-color: #95a5a6;
        }

        /* Equals button */
        .btn-equals {
            background-color: #27ae60;
            color: white;
            grid-column: span 2; /* Span two columns */
        }
        .btn-equals:hover {
            background-color: #2ecc71;
        }

        /* Zero button spans two columns */
        .btn-zero {
            grid-column: span 2;
        }

        /* Theme toggle button */
        .theme-toggle-container {
            text-align: center;
            margin-top: 20px;
        }

        .theme-toggle-button {
            background-color: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.2s;
        }

        .theme-toggle-button:hover {
            background-color: #2980b9;
        }

        /* History Panel */
        .history-panel {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .dark-mode .history-panel {
            background-color: #4a6572;
            color: #ecf0f1;
        }

        .history-panel h4 {
            margin-top: 0;
            color: #34495e;
        }
        .dark-mode .history-panel h4 {
            color: #ecf0f1;
        }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #e0e0e0;
            padding-top: 10px;
            margin-bottom: 10px;
        }
        .dark-mode .history-list {
            border-top: 1px solid #7f8c8d;
        }

        .history-list li {
            padding: 5px 0;
            font-size: 0.9em;
            color: #555;
            border-bottom: 1px dashed #eee;
        }
        .dark-mode .history-list li {
            color: #ccc;
            border-bottom: 1px dashed #7f8c8d;
        }

        .history-list li:last-child {
            border-bottom: none;
        }

        .history-clear-button {
            width: 100%;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
        .history-clear-button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="calculator-wrapper">
        <div class="calculator-container">
            <div class="theme-toggle-container">
                <button id="theme-toggle" class="btn theme-toggle-button">Toggle Dark Mode</button>
            </div>
            <div class="display">
                <div id="display-expression" class="display-expression" aria-live="polite" aria-atomic="true"></div>
                <div id="display-result" class="display-result" aria-live="polite" aria-atomic="true">0</div>
            </div>

            <div class="calculator-buttons">
                <!-- Row 1 -->
                <button type="button" class="btn btn-special" data-action="clear-all" aria-label="All Clear">AC</button>
                <button type="button" class="btn btn-special" data-action="backspace" aria-label="Backspace">←</button>
                <button type="button" class="btn btn-special" data-action="percentage" aria-label="Percentage">%</button>
                <button type="button" class="btn btn-operator" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

                <!-- Row 2 -->
                <button type="button" class="btn btn-number" data-action="number" data-value="7" aria-label="Seven">7</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="8" aria-label="Eight">8</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="9" aria-label="Nine">9</button>
                <button type="button" class="btn btn-operator" data-action="operator" data-value="×" aria-label="Multiply">×</button>

                <!-- Row 3 -->
                <button type="button" class="btn btn-number" data-action="number" data-value="4" aria-label="Four">4</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="5" aria-label="Five">5</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="6" aria-label="Six">6</button>
                <button type="button" class="btn btn-operator" data-action="operator" data-value="-" aria-label="Subtract">-</button>

                <!-- Row 4 -->
                <button type="button" class="btn btn-number" data-action="number" data-value="1" aria-label="One">1</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="2" aria-label="Two">2</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="3" aria-label="Three">3</button>
                <button type="button" class="btn btn-operator" data-action="operator" data-value="+" aria-label="Add">+</button>

                <!-- Row 5 -->
                <button type="button" class="btn btn-special" data-action="toggle-sign" aria-label="Toggle Sign">+/-</button>
                <button type="button" class="btn btn-number" data-action="number" data-value="0" aria-label="Zero">0</button>
                <button type="button" class="btn btn-number" data-action="decimal" data-value="." aria-label="Decimal Point">.</button>
                <button type="button" class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>
            </div>
        </div>

        <div class="history-panel calculator-container mt-4">
            <h4>Calculation History</h4>
            <ul id="history-list" class="history-list">
                <!-- History items will be inserted here -->
            </ul>
            <button id="clear-history" class="btn history-clear-button">Clear History</button>
        </div>
    </div>

    <!-- Bootstrap JS CDN (Popper.js and Bootstrap JS) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlcooxfAbVgX/M7x7wa6jwJtFfGVhXHlwpLCTasiDo0QBug" crossorigin="anonymous"></script>

    <script>
        // Data Layer (Central State Store)
        const calculatorState = {
            currentExpression: '',
            currentResult: '0',
            history: [], // Stores objects: { expression: '2+3', result: '5', timestamp: '...' }
            memory: 0, // Placeholder for future memory functions
            error: null,
            theme: localStorage.getItem('calculatorTheme') || 'light', // Load theme from local storage
            justEvaluated: false // Flag to know if '=' was just pressed
        };

        // DOM Elements
        const displayExpression = document.getElementById('display-expression');
        const displayResult = document.getElementById('display-result');
        const calculatorButtons = document.querySelector('.calculator-buttons');
        const themeToggleButton = document.getElementById('theme-toggle');
        const historyList = document.getElementById('history-list');
        const clearHistoryButton = document.getElementById('clear-history');

        // Application Layer (Core Logic Modules & Event Handlers)

        // Utility: Apply operator to two numbers
        function applyOperator(num1, operator, num2) {
            switch (operator) {
                case '+': return num1 + num2;
                case '-': return num1 - num2;
                case '*': return num1 * num2;
                case '/':
                    if (num2 === 0) throw new Error('Divide by zero');
                    return num1 / num2;
                default: throw new Error('Unknown operator');
            }
        }

        // Core Calculator Engine: Evaluate expression without eval()
        // Handles +, -, *, / with precedence (no parentheses for MVP)
        function evaluateExpression(expression) {
            let cleanExpr = expression.replace(/×/g, '*').replace(/÷/g, '/');

            // Regex to tokenize numbers and operators.
            // Handles cases like "5--3" as [5, -, -, 3] which the logic below will need to filter.
            // For MVP, we assume a relatively clean input like "5+3", "5*3-2".
            const tokens = [];
            let lastTokenWasNumber = false;
            let currentNumber = '';

            for (let i = 0; i < cleanExpr.length; i++) {
                const char = cleanExpr[i];
                if (char >= '0' && char <= '9' || char === '.') {
                    currentNumber += char;
                    lastTokenWasNumber = true;
                } else {
                    if (currentNumber !== '') {
                        tokens.push(parseFloat(currentNumber));
                        currentNumber = '';
                    }
                    if (['+', '-', '*', '/'].includes(char)) {
                        tokens.push(char);
                        lastTokenWasNumber = false;
                    } else {
                        // Handle invalid characters or complex scenarios if needed
                        return 'Error: Syntax';
                    }
                }
            }
            if (currentNumber !== '') {
                tokens.push(parseFloat(currentNumber));
            }

            if (tokens.length === 0) return '0';

            let numbers = [];
            let operators = [];

            const precedence = {'+': 1, '-': 1, '*': 2, '/': 2};

            try {
                for (let i = 0; i < tokens.length; i++) {
                    let token = tokens[i];

                    if (typeof token === 'number') {
                        numbers.push(token);
                    } else { // It's an operator
                        while (
                            operators.length > 0 &&
                            ['+', '-', '*', '/'].includes(operators[operators.length - 1]) &&
                            precedence[operators[operators.length - 1]] >= precedence[token]
                        ) {
                            let op = operators.pop();
                            let num2 = numbers.pop();
                            let num1 = numbers.pop();
                            if (num1 === undefined || num2 === undefined) throw new Error('Syntax Error');
                            numbers.push(applyOperator(num1, op, num2));
                        }
                        operators.push(token);
                    }
                }

                // Apply remaining operators
                while (operators.length > 0) {
                    let op = operators.pop();
                    let num2 = numbers.pop();
                    let num1 = numbers.pop();
                    if (num1 === undefined || num2 === undefined) throw new Error('Syntax Error');
                    numbers.push(applyOperator(num1, op, num2));
                }

                if (numbers.length !== 1) {
                    throw new Error('Syntax Error');
                }

                let result = numbers[0];
                if (isNaN(result)) {
                    throw new Error('Calculation Error');
                }
                return result.toString();

            } catch (e) {
                return 'Error: ' + e.message;
            }
        }


        // History Module
        const historyManager = {
            addEntry: (expression, result) => {
                if (expression && result !== 'Error' && result !== 'NaN' && result !== 'Infinity' && result !== '-Infinity') {
                    calculatorState.history.unshift({
                        expression: expression,
                        result: result,
                        timestamp: new Date().toLocaleString()
                    });
                    // Keep history to a reasonable length (e.g., 10 entries)
                    if (calculatorState.history.length > 10) {
                        calculatorState.history.pop();
                    }
                    saveState();
                }
            },
            clearHistory: () => {
                calculatorState.history = [];
                saveState();
            },
            getHistory: () => calculatorState.history
        };

        // Theme Module
        const themeManager = {
            applyTheme: (theme) => {
                document.body.classList.remove('light-mode', 'dark-mode');
                document.body.classList.add(theme + '-mode');
                themeToggleButton.textContent = theme === 'dark' ? 'Toggle Light Mode' : 'Toggle Dark Mode';
                localStorage.setItem('calculatorTheme', theme);
            },
            toggleTheme: () => {
                const newTheme = calculatorState.theme === 'light' ? 'dark' : 'light';
                calculatorState.theme = newTheme;
                themeManager.applyTheme(newTheme);
            }
        };

        // Input Module & Application Logic
        function handleInput(value, type) {
            calculatorState.error = null; // Clear any previous error

            if (type === 'number' || type === 'decimal') {
                if (calculatorState.justEvaluated) {
                    calculatorState.currentExpression = ''; // Clear expression after '='
                    calculatorState.currentResult = '0'; // Reset result for new calculation
                    calculatorState.justEvaluated = false;
                }

                const lastChar = calculatorState.currentExpression.slice(-1);
                // Prevent multiple decimals in one number
                if (type === 'decimal' && (calculatorState.currentExpression.includes('.') && lastChar !== '+' && lastChar !== '-' && lastChar !== '×' && lastChar !== '÷')) {
                     // Check if there's a decimal in the current number segment
                     const parts = calculatorState.currentExpression.split(/[\+\-×÷]/);
                     if (parts[parts.length - 1].includes('.')) {
                        return; // Already has a decimal
                     }
                }
                // Prevent leading zero unless it's followed by a decimal
                if (calculatorState.currentExpression === '0' && value !== '.') {
                    calculatorState.currentExpression = value;
                } else if (['+', '-', '×', '÷'].includes(lastChar) && value === '0' && calculatorState.currentExpression.endsWith('0')) {
                    // Prevent entering "5+00"
                    return;
                }
                else {
                    calculatorState.currentExpression += value;
                }
                // Update result display with current input if it's a fresh number entry
                calculatorState.currentResult = calculatorState.currentExpression;


            } else if (type === 'operator') {
                calculatorState.justEvaluated = false;
                if (calculatorState.currentExpression === '' && calculatorState.currentResult !== '0') {
                    // If no expression is built but a result exists, start new expression with result
                    calculatorState.currentExpression = calculatorState.currentResult;
                }
                if (calculatorState.currentExpression === '') {
                    return; // Cannot start with an operator
                }

                const lastChar = calculatorState.currentExpression.slice(-1);
                if (['+', '-', '×', '÷'].includes(lastChar)) {
                    // Replace last operator if a new one is pressed immediately
                    calculatorState.currentExpression = calculatorState.currentExpression.slice(0, -1) + value;
                } else {
                    calculatorState.currentExpression += value;
                }
                calculatorState.currentResult = '0'; // Reset result display for next number
            } else if (type === 'equals') {
                if (calculatorState.currentExpression === '') {
                    calculatorState.currentExpression = calculatorState.currentResult; // If user just presses =
                }
                const expressionToEvaluate = calculatorState.currentExpression;
                let result = evaluateExpression(expressionToEvaluate);

                calculatorState.error = result.startsWith('Error:') ? result : null;
                if (!calculatorState.error) {
                    calculatorState.currentResult = result;
                    historyManager.addEntry(expressionToEvaluate, result);
                    calculatorState.currentExpression = result; // Set expression to result for chaining operations
                } else {
                    calculatorState.currentResult = 'Error'; // Display generic error
                    calculatorState.currentExpression = ''; // Clear expression on error
                }
                calculatorState.justEvaluated = true; // Mark that evaluation just happened

            } else if (type === 'clear-all') {
                calculatorState.currentExpression = '';
                calculatorState.currentResult = '0';
                calculatorState.error = null;
                calculatorState.justEvaluated = false;
            } else if (type === 'backspace') {
                if (calculatorState.justEvaluated) {
                    // If result was just calculated, backspace should affect the result,
                    // but for simplicity and consistency with input, clear expression.
                    calculatorState.currentExpression = '';
                    calculatorState.currentResult = '0';
                    calculatorState.justEvaluated = false;
                } else if (calculatorState.currentExpression.length > 0) {
                    calculatorState.currentExpression = calculatorState.currentExpression.slice(0, -1);
                    if (calculatorState.currentExpression === '') {
                        calculatorState.currentResult = '0';
                    } else {
                        // Attempt to show partial calculation or just the current number
                        const lastChar = calculatorState.currentExpression.slice(-1);
                        if (['+', '-', '×', '÷'].includes(lastChar)) {
                             // If last char is operator, show the number before it
                             const parts = calculatorState.currentExpression.split(/[\+\-×÷]/);
                             calculatorState.currentResult = parts[parts.length - 2] || '0';
                        } else {
                             // Show current number part
                             const parts = calculatorState.currentExpression.split(/[\+\-×÷]/);
                             calculatorState.currentResult = parts[parts.length - 1] || '0';
                        }
                    }
                }
            } else if (type === 'percentage') {
                // Apply percentage to the current number or the current result
                if (calculatorState.justEvaluated && calculatorState.currentResult !== '0') {
                    calculatorState.currentExpression = (parseFloat(calculatorState.currentResult) / 100).toString();
                    calculatorState.currentResult = calculatorState.currentExpression;
                    calculatorState.justEvaluated = false;
                } else if (calculatorState.currentExpression !== '') {
                    // Find the last number in the expression and apply percentage
                    const match = calculatorState.currentExpression.match(/(\d+\.?\d*)$/);
                    if (match) {
                        const num = parseFloat(match[1]);
                        const percentValue = num / 100;
                        calculatorState.currentExpression = calculatorState.currentExpression.slice(0, -match[1].length) + percentValue.toString();
                        calculatorState.currentResult = percentValue.toString();
                    } else {
                        // If no number, treat 0% as 0
                        calculatorState.currentResult = '0';
                        calculatorState.currentExpression = '0';
                    }
                } else {
                    calculatorState.currentResult = '0';
                    calculatorState.currentExpression = '0';
                }
                calculatorState.justEvaluated = false;
            } else if (type === 'toggle-sign') {
                if (calculatorState.justEvaluated && calculatorState.currentResult !== '0') {
                    calculatorState.currentResult = (parseFloat(calculatorState.currentResult) * -1).toString();
                    calculatorState.currentExpression = calculatorState.currentResult;
                } else if (calculatorState.currentExpression !== '') {
                    // Find the last number and toggle its sign
                    const lastOperatorIndex = Math.max(
                        calculatorState.currentExpression.lastIndexOf('+'),
                        calculatorState.currentExpression.lastIndexOf('-'),
                        calculatorState.currentExpression.lastIndexOf('×'),
                        calculatorState.currentExpression.lastIndexOf('÷')
                    );

                    let lastNumber = calculatorState.currentExpression;
                    let prefix = '';

                    if (lastOperatorIndex !== -1) {
                        lastNumber = calculatorState.currentExpression.substring(lastOperatorIndex + 1);
                        prefix = calculatorState.currentExpression.substring(0, lastOperatorIndex + 1);
                    }

                    if (!isNaN(parseFloat(lastNumber))) {
                        const toggled = (parseFloat(lastNumber) * -1).toString();
                        calculatorState.currentExpression = prefix + toggled;
                        calculatorState.currentResult = toggled;
                    }
                }
                calculatorState.justEvaluated = false;
            }
            // Add scientific/memory functions here in Phase 2
            // For MVP, these are not implemented.

            updateDisplay();
            saveState(); // Save state after every action
        }

        // Display Module: Renders UI based on state
        function updateDisplay() {
            if (calculatorState.error) {
                displayExpression.textContent = 'Error';
                displayResult.textContent = calculatorState.error.replace('Error: ', '');
            } else {
                displayExpression.textContent = calculatorState.currentExpression || '0';
                displayResult.textContent = calculatorState.currentResult;
            }

            // Update history display
            historyList.innerHTML = '';
            historyManager.getHistory().forEach(entry => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${entry.expression}</strong> = ${entry.result} <br><small>${entry.timestamp}</small>`;
                historyList.appendChild(li);
            });
        }

        // Persistence: Save/Load state from Local Storage
        function saveState() {
            localStorage.setItem('calculatorState', JSON.stringify(calculatorState));
        }

        function loadState() {
            const savedState = localStorage.getItem('calculatorState');
            if (savedState) {
                const parsedState = JSON.parse(savedState);
                // Merge saved state, but keep initial values for properties that should reset on load
                calculatorState.currentExpression = parsedState.currentExpression || '';
                calculatorState.currentResult = parsedState.currentResult || '0';
                calculatorState.history = parsedState.history || [];
                calculatorState.memory = parsedState.memory || 0;
                calculatorState.theme = parsedState.theme || 'light';
                // Reset volatile states like error and justEvaluated on load
                calculatorState.error = null;
                calculatorState.justEvaluated = false;
            }
            themeManager.applyTheme(calculatorState.theme);
            updateDisplay();
        }

        // Event Listeners (Presentation Layer)
        calculatorButtons.addEventListener('click', (event) => {
            const button = event.target.closest('button');
            if (!button) return;

            const action = button.dataset.action;
            const value = button.dataset.value;

            handleInput(value, action);
        });

        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (key >= '0' && key <= '9') {
                handleInput(key, 'number');
            } else if (key === '.') {
                handleInput('.', 'decimal');
            } else if (key === '+' || key === '-') {
                handleInput(key, 'operator');
            } else if (key === '*') {
                handleInput('×', 'operator'); // Map * to × for display
            } else if (key === '/') {
                event.preventDefault(); // Prevent browser quick find
                handleInput('÷', 'operator'); // Map / to ÷ for display
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault(); // Prevent form submission if in a form
                handleInput('=', 'equals');
            } else if (key === 'Backspace') {
                handleInput('backspace', 'clear');
            } else if (key === 'Escape') {
                handleInput('ac', 'clear-all');
            } else if (key === '%') {
                handleInput('%', 'percentage');
            }
            // No specific keyboard mapping for +/- yet
        });

        themeToggleButton.addEventListener('click', themeManager.toggleTheme);
        clearHistoryButton.addEventListener('click', () => {
            historyManager.clearHistory();
            updateDisplay();
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', loadState);

    </script>
</body>
</html>
