<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="calculator-display">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>
        <div class="calculator-buttons">
            <button data-all-clear class="span-two">AC</button>
            <button data-clear>C</button>
            <button data-operator operator-type="division">&divide;</button>
            <button data-number>7</button>
            <button data-number>8</button>
            <button data-number>9</button>
            <button data-operator operator-type="multiplication">&times;</button>
            <button data-number>4</button>
            <button data-number>5</button>
            <button data-number>6</button>
            <button data-operator operator-type="addition">+</button>
            <button data-number>1</button>
            <button data-number>2</button>
            <button data-number>3</button>
            <button data-operator operator-type="subtract">-</button>
            <button data-number class="span-two">0</button>
            <button data-number>.</button>
            <button data-equals class="span-two-vertical">=</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
